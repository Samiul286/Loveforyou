<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Dreamy Journey</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;500;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Persistent Background -->
    <div id="sky-bg">
        <canvas id="star-canvas"></canvas>
    </div>

    <!-- Hero Section -->
    <section id="hero-section">
        <div class="glass-title">
            <h1>For Akhi <i class="fa-solid fa-moon sparkling"></i></h1>
            <p>Our memories written in the stars...</p>
        </div>
        <div class="scroll-prompt">
            <span>Scroll to Journey</span>
            <div class="mouse-icon">
                <div class="wheel"></div>
            </div>
        </div>
    </section>

    <!-- Timeline Journey -->
    <section id="journey-timeline">
        <div class="glow-path">
            <div class="glow-fill"></div>
        </div>
        <div id="nodes-container"></div>
    </section>

    <!-- Finale -->
    <section id="finale-section">
        <div class="glass-title text-center">
            <h2 style="font-family: var(--font-heading); font-size: 3.5rem; color: var(--accent-dark); margin-bottom: 2rem;">The story continues...</h2>
            <a href="miss-you.html" class="cute-btn primary pulse">
                I Miss You <i class="fa-solid fa-sparkles" style="color: #fff;"></i>
            </a>
        </div>
    </section>

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
